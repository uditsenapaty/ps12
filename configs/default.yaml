# PS12 default configuration. Override per-experiment with a copy in configs/.

normalization:
  bt_min: 180.0          # K — coldest realistic cloud top (10 µm window)
  bt_max: 330.0          # K — hottest realistic surface

tiling:
  tile: 256              # training patch / inference tile size
  overlap: 32            # feather-blend overlap for seamless full-disk reconstruction

data:
  sources: [goes19, himawari9]     # Steps 1-3 train/validate
  target: insat3dr                  # Step 4 (apply best model); insat3ds for final delivery
  step_min:
    goes19: 10
    himawari9: 10
    insat3dr: 30
    insat3ds: 30
  region_crop: null                 # optional [lat0, lat1, lon0, lon1] to bound the 100 GB budget
  max_gb: 80

train:
  model: rife                       # primary workhorse to fine-tune
  lr: 1.0e-4
  batch_size: 8                     # per-step tiles; use grad-accum on T4
  grad_accum: 2
  patch: 256
  max_steps: 20000
  val_every: 500
  seed: 1234
  augment: [flip, rot90]            # geometry-only (BT physical values preserved)
  loss: [l1, census]                # photometric L1 + census/structure

anytime:                            # arbitrary-time (time-conditioned) training — opt-in & tunable (it
                                    # multiplies sample count / training time, so configure per budget)
  enabled: true                     # pass --anytime to finetune to use the index's arbitrary-time samples
  time_step: 0.25                   # t-grid spacing in (0,1); MUST divide 1. 0.5 = midpoint only (cheapest);
                                    # 0.25 = t{0.25,0.5,0.75} (needed for 7.5-min); 0.2 = {0.2,0.4,0.6,0.8}
  gap_levels: 3                     # number of gap sizes (granules); spans = base,2·base,3·base where
                                    # base = (1/time_step)·cadence (so every grid t lands on a real frame)

multigap:                           # temporal multi-granularity — ONE target reconstructed from several
                                    # SYMMETRIC brackets at t=0.5, with a combined loss (consistency across gaps)
  enabled: false                    # pass --multigap to finetune to use the index's multigap groups
  levels: 2                         # max symmetric bracket level per target: L=1..levels uses (g-L, g+L).
                                    # frame@10 -> (0,20); frame@20 -> (10,30),(0,40); cost ≈ L× per step

selfsup_insat:
  enabled: true
  step_min: 30                      # triplets (00:00, 00:30, 01:00) -> predict 00:30
  init_from: train.model            # start from the GOES/Himawari fine-tuned weights
  max_steps: 5000
  lr: 5.0e-5

eval:
  models: [classical, raft, rife, film, superslomo]
  factors: [2, 4]                   # 2x -> 15 min, 4x -> 7.5 min
  metrics: [mse, psnr, ssim, fsim, lpips, edge_ssim, mae_kelvin]

paths:
  data_dir: data
  samples_dir: samples
  outputs_dir: outputs
  weights_dir: weights
  index_dir: data/index
